<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hebrew Trace Canvas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="captureBtn">📸</button>
    </div>

    <div id="previewOverlay">
        <div class="preview-instruction">
            Review Capture<br>
            <span style="font-size: 11px; color: #888;">(iPhone users: Hold down on the image to save directly to Photos)</span>
        </div>
        
        <img id="previewImage" alt="Captured layout stitch preview asset" />
        
        <div class="preview-actions">
            <button class="btn-action btn-share" id="shareBtn">Share / Send</button>
            <button class="btn-action btn-download" id="downloadBtn">Save to Device</button>
            <button class="btn-action btn-cancel" id="cancelBtn">Retake 🔄</button>
        </div>
    </div>

    <!-- This line pulls all the JavaScript out of this file -->
    <script src="app.js"></script>
</body>
</html>
