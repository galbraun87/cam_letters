html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    width: 100%;
    height: 100%;
    font-family: 'RubikCanvas', sans-serif;
}

#canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
}

#video {
    display: none;
}

.controls {
    position: absolute;
    bottom: 30px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    z-index: 10;
}

button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    background: rgba(255,255,255,0.85);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'RubikCanvas', sans-serif;
}

button:active {
    background: rgba(255,255,255,0.6);
}

#previewOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    box-sizing: border-box;
    padding: 20px;
}

.preview-instruction {
    color: #ccc;
    font-size: 14px;
    text-align: center;
    margin-top: 10px;
}

#previewImage {
    max-width: 100%;
    max-height: 65vh;
    object-fit: contain;
    border: 2px solid #333;
    border-radius: 8px;
    margin: auto 0;
}

.preview-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 300px;
    margin-bottom: 20px;
}

.btn-action {
    width: 100%;
    height: 48px;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'RubikCanvas', sans-serif;
    border: none;
    cursor: pointer;
}

.btn-share {
    background: #007aff;
    color: white;
}

.btn-download {
    background: #34c759;
    color: white;
}

.btn-cancel {
    background: #ff3b30;
    color: white;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div class="controls">
    <button onclick="capture()">📸</button>
</div>

<div id="previewOverlay">
    <div class="preview-instruction">
        Review Capture<br>
        <span style="font-size: 11px; color: #888;">(iPhone users: Hold down on the image to save directly to Photos)</span>
    </div>
    
    <img id="previewImage" alt="Captured layout stitch preview asset" />
    
    <div class="preview-actions">
        <button class="btn-action btn-share" onclick="shareCapturedImage()">Share / Send</button>
        <button class="btn-action btn-download" onclick="downloadDirectly()">Save to Device</button>
        <button class="btn-action btn-cancel" onclick="closePreview()">Retake 🔄</button>
    </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let activeBlob = null;
let activeFilename = "";
let letter = "א";

function getLetter() {
    const params = new URLSearchParams(window.location.search);
    const urlLetter = params.get("letter");
    if (urlLetter) {
        letter = urlLetter;
    }
}
getLetter();

navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } },
    audio: false
})
.then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => {
        video.play().catch(err => console.error("Video play failed:", err));
    };
})
.catch(err => {
    alert("Camera error: " + err.message);
});

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
        const tracks = video.srcObject?.getTracks();
        if (tracks && tracks.length > 0 && tracks[0].readyState === "ended") {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: { ideal: "environment" } },
                audio: false
            })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play().catch(err => console.error("Video play failed:", err));
                };
            })
            .catch(err => console.error("Camera reinitialization error:", err));
        }
    }
});

function resize(){
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

function drawCamera(context){
    const w = window.innerWidth;
    const h = window.innerHeight;
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if (!vw || !vh) return;

    const scale = Math.max(w / vw, h / vh);
    const dw = vw * scale;
    const dh = vh * scale;
    const dx = (w - dw) / 2;
    const dy = (h - dh) / 2;

    context.drawImage(video, dx, dy, dw, dh);
}

function drawLetter(context){
    const w = window.innerWidth;
    const h = window.innerHeight;
    
    // Explicit dynamic pixel calculation for low-level mobile engines
    const computedFontSize = Math.floor(h * 0.75);

    context.font = `700 ${computedFontSize}px RubikCanvas, sans-serif`;
    context.textAlign = "center";
    context.textBaseline = "middle";
    context.lineWidth = 4;
    context.strokeStyle = "white";

    context.strokeText(letter, w / 2, h / 2 - h * 0.10);
}

function draw(){
    const w = window.innerWidth;
    const h = window.innerHeight;
    ctx.clearRect(0, 0, w, h);

    if(video.readyState >= 2){
        drawCamera(ctx);
        drawLetter(ctx);
    }
    requestAnimationFrame(draw);
}

// Execute font verification against local string cache
if (document.fonts && document.fonts.load) {
    document.fonts.load("700 16px RubikCanvas").then(() => {
        if (video.readyState >= 2) {
            draw();
        } else {
            video.addEventListener("loadeddata", draw);
        }
    }).catch(err => {
        console.error("Font trace loop mismatch:", err);
        if (video.readyState >= 2) draw(); else video.addEventListener("loadeddata", draw);
    });
} else {
    video.addEventListener("loadeddata", draw);
}

function getTimestamp() {
    const now = new Date();
    return `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}`;
}

function capture(){
    const w = window.innerWidth;
    const h = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;

    const stitchCanvas = document.createElement("canvas");
    stitchCanvas.width = (w * dpr) * 2;
    stitchCanvas.height = h * dpr;
    const stitchCtx = stitchCanvas.getContext("2d");

    stitchCtx.save();
    stitchCtx.scale(dpr, dpr);
    drawCamera(stitchCtx);
    stitchCtx.restore();

    stitchCtx.save();
    stitchCtx.translate(w * dpr, 0);
    stitchCtx.scale(dpr, dpr);
    drawCamera(stitchCtx);
    stitchCtx.drawLetter = drawLetter;
    stitchCtx.drawLetter(stitchCtx);
    stitchCtx.restore();
      
    activeFilename = hebrew_trace_${getTimestamp()}.jpg;
    stitchCanvas.toBlob((blob) => {
        if (!blob) return;
        activeBlob = blob;
        const previewImg = document.getElementById("previewImage");
        previewImg.src = URL.createObjectURL(blob);
        document.getElementById("previewOverlay").style.display = "flex";
    }, "image/jpeg", 0.92);
}
    
async function shareCapturedImage() {
    if (!activeBlob) return;
    const file = new File([activeBlob], activeFilename, { type: "image/jpeg" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
            await navigator.share({
                files: [file],
                title: 'Hebrew Trace: ${letter}',
                text: 'Side-by-side composition snapshot trace.'
            });
        } catch (err) {
            console.log("Share canceled:", err);
        }
    } else {
        alert("Sharing sheet interface is blocked or unsupported in this context.");
    }
}

// 3. Android / UniversalBrowser File Download Fallback Layer
function downloadDirectly() {
    if (!activeBlob) return;
    
    const downloadLink = document.createElement("a");
    downloadLink.download = activeFilename;
    downloadLink.href = URL.createObjectURL(activeBlob);
    downloadLink.click();
    
    // Revoke object URL after structural click execution to optimize clean device browser engine runtimes
    setTimeout(() => URL.revokeObjectURL(downloadLink.href), 100);
}

// 4. Interface state destruction layer
function closePreview() {
    document.getElementById("previewOverlay").style.display = "none";
    
    // Clean down old memory objects
    if (document.getElementById("previewImage").src.startsWith("blob:")) {
        URL.revokeObjectURL(document.getElementById("previewImage").src);
    }
    activeBlob = null;
    activeFilename = "";
}
</script>

</body>
</html>
