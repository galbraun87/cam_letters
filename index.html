<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<style>
@font-face {
    font-family: 'AndroidSystemFont';
    src: url('GoogleSans-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
}

html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    width: 100vw;
    /* FIXED: Uses svh to declare structural bounds safely under the iOS navigation bar */
    height: 100svh; 
    font-family: 'AndroidSystemFont', sans-serif;
}

#canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100svh; /* FIXED: Clamps canvas viewport coordinates to matching svh values */
}

#video {
    display: none;
}

.controls {
    position: absolute;
    /* FIXED: Positions the button container exactly 10% away from the actual screen floor */
    bottom: 5svh; 
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    background: rgba(255,255,255,0.85);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'AndroidSystemFont', sans-serif;
}

button:active {
    background: rgba(255,255,255,0.6);
}

#previewOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100svh; /* FIXED: Aligns the review overlay structure cleanly to mobile panels */
    background: rgba(0, 0, 0, 0.95);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    box-sizing: border-box;
    padding: 20px;
}

.preview-instruction {
    color: #ccc;
    font-size: 14px;
    text-align: center;
    margin-top: 10px;
}

#previewImage {
    max-width: 100%;
    max-height: 65svh; /* FIXED: Protects image rendering allocations inside standard guidelines */
    object-fit: contain;
    border: 2px solid #333;
    border-radius: 8px;
    margin: auto 0;
}

.preview-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 300px;
    margin-bottom: 20px;
}

.btn-action {
    width: 100%;
    height: 48px;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'AndroidSystemFont', sans-serif;
    border: none;
    cursor: pointer;
}

.btn-share {
    background: #007aff;
    color: white;
}

.btn-download {
    background: #34c759;
    color: white;
}

.btn-cancel {
    background: #ff3b30;
    color: white;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div class="controls">
    <button onclick="capture()">📸</button>
</div>

<div id="previewOverlay">
    <div class="preview-instruction">
        Review Capture<br>
        <span style="font-size: 11px; color: #888;">(iPhone users: Hold down on the image to save directly to Photos)</span>
    </div>
    
    <img id="previewImage" alt="Captured layout stitch preview asset" />
    
    <div class="preview-actions">
        <button class="btn-action btn-share" onclick="shareCapturedImage()">Share / Send</button>
        <button class="btn-action btn-download" onclick="downloadDirectly()">Save to Device</button>
        <button class="btn-action btn-cancel" onclick="closePreview()">Retake 🔄</button>
    </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let activeBlob = null;
let activeFilename = "";
let letter = "א";

function getLetter() {
    const params = new URLSearchParams(window.location.search);
    const urlLetter = params.get("letter");
    if (urlLetter) {
        letter = urlLetter;
    }
}
getLetter();

// Global variable to keep track of the active stream
let stream = null;

// Extracted configuration logic to cleanly handle 1x camera filtering
async function startMainCamera() {
    try {
        // Stop any old streams running in the background first
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }

        // 1. Scan all media devices attached to the phone
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');
        
        let targetDeviceId = null;

        if (videoDevices.length > 0) {
            // 2. Scan labels to isolate the 1x main camera (filtering out ultra-wide/telephoto/macro)
            const mainBackCamera = videoDevices.find(device => {
                const label = device.label.toLowerCase();
                return label.includes('back') && 
                      !label.includes('ultra') && 
                      !label.includes('wide') && 
                      !label.includes('tele') &&
                      !label.includes('macro');
            });

            // 3. Fallback: If labels aren't descriptive, pick any standard back camera
            const genericBackCamera = videoDevices.find(device => 
                device.label.toLowerCase().includes('back') || 
                device.label.toLowerCase().includes('environment')
            );

            // Prioritize the isolated 1x lens ID, fallback to general back camera, or default to first device
            targetDeviceId = mainBackCamera ? mainBackCamera.deviceId : (genericBackCamera ? genericBackCamera.deviceId : videoDevices[0].deviceId);
        }

        // 4. Build constraints using the exact device ID if found
        const constraints = {
            video: {
                deviceId: targetDeviceId ? { exact: targetDeviceId } : undefined,
                facingMode: targetDeviceId ? undefined : "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 },
                aspectRatio: { ideal: 1.7777777778 }
            },
            audio: false
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        video.play();

    } catch (err) {
        console.error("Camera configuration failed: ", err);
    }
}

// Kick off the initial camera startup execution
startMainCamera();

// Refactored visibility listener to use our clean 1x stream filter loop
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
        const tracks = stream ? stream.getTracks() : null;
        if (!tracks || (tracks.length > 0 && tracks[0].readyState === "ended")) {
            startMainCamera();
        }
    }
});

function resize(){
    // FIXED: Grab safe system viewport measurements to lock canvas dimension consistency
    const displayHeight = window.innerHeight; 
    const dpr = window.devicePixelRatio || 1;
    
    canvas.width = window.innerWidth * dpr;
    canvas.height = displayHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// FIXED: Added an optional override width parameter to isolate cross-side aspect calculations
function drawCamera(context, customWidth = null){
    const w = customWidth || window.innerWidth; // Uses specific panel bounds during stitch phase
    const h = canvas.height / (window.devicePixelRatio || 1);
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if (!vw || !vh) return;

    const scale = Math.max(w / vw, h / vh);
    const dw = vw * scale;
    const dh = vh * scale;
    const dx = (w - dw) / 2;
    const dy = (h - dh) / 2;

    context.drawImage(video, dx, dy, dw, dh);
}

// 1. Capture and generation layer
function capture() {
    // 1. Establish strict, unshifting width dimensions for a single panel
    const singleWidth = window.innerWidth;
    const h = canvas.height / (window.devicePixelRatio || 1);
    const dpr = window.devicePixelRatio || 1;

    const stitchCanvas = document.createElement("canvas");
    
    // 2. Total width is strictly double the single panel width, adjusted for high-DPI screens
    stitchCanvas.width = (singleWidth * dpr) * 2;
    stitchCanvas.height = h * dpr;
    const stitchCtx = stitchCanvas.getContext("2d");

    // --- RENDER LEFT SIDE ---
    stitchCtx.save();
    stitchCtx.scale(dpr, dpr);
    // Explicitly pass singleWidth so the aspect ratio calculation is identical
    drawCamera(stitchCtx, singleWidth); 
    stitchCtx.restore();

    // --- RENDER RIGHT SIDE ---
    stitchCtx.save();
    // Shift the drawing context precisely by the physical width of one panel
    stitchCtx.translate(singleWidth * dpr, 0); 
    stitchCtx.scale(dpr, dpr);
    
    // FIXED: By passing singleWidth here instead of letting it read global layouts,
    // the field of view, crop coordinates, and aspect ratio will match the left side perfectly.
    drawCamera(stitchCtx, singleWidth); 
    
    // Overlay your tracing outline on top of the right panel
    if (typeof drawLetter === "function") {
        drawLetter(stitchCtx);
    }
    stitchCtx.restore();

    // 3. Export to image preview
    activeFilename = `hebrew_trace_${getTimestamp()}.jpg`;

    stitchCanvas.toBlob((blob) => {
        if (!blob) return;
        activeBlob = blob;
        const previewImg = document.getElementById("previewImage");
        previewImg.src = URL.createObjectURL(blob);
        document.getElementById("previewOverlay").style.display = "flex";
    }, "image/jpeg", 0.92);
}

function drawLetter(context){
    const w = window.innerWidth;
    const h = canvas.height / (window.devicePixelRatio || 1); // FIXED: Sync layout metrics against local rendering scopes
    
    // FIXED: Scales the letter cleanly to occupy 70% of available space to stay out of the button bounds
    const computedFontSize = Math.floor(h * 0.85);

    context.font = `700 ${computedFontSize}px AndroidSystemFont, sans-serif`;
    context.textAlign = "center";
    context.textBaseline = "middle";
    context.lineWidth = 4;
    context.strokeStyle = "white";

    // FIXED: Positions center precisely to sit balanced higher up, preventing collisions
    context.strokeText(letter, w / 2, h * 0.48);
}

function draw(){
    const w = window.innerWidth;
    const h = canvas.height / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, h);

    if(video.readyState >= 2){
        drawCamera(ctx);
        drawLetter(ctx);
    }
    requestAnimationFrame(draw);
}

if (document.fonts && document.fonts.load) {
    document.fonts.load("700 16px AndroidSystemFont").then(() => {
        if (video.readyState >= 2) {
            draw();
        } else {
            video.addEventListener("loadeddata", draw);
        }
    }).catch(err => {
        console.error("Font trace loop mismatch:", err);
        if (video.readyState >= 2) draw(); else video.addEventListener("loadeddata", draw);
    });
} else {
    video.addEventListener("loadeddata", draw);
}

function getTimestamp() {
    const now = new Date();
    return `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}`;
}

async function shareCapturedImage() {
    if (!activeBlob) return;
    const file = new File([activeBlob], activeFilename, { type: "image/jpeg" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
            await navigator.share({
                files: [file],
                title: `Hebrew Trace: ${letter}`,
                text: 'Side-by-side composition snapshot trace.'
            });
        } catch (err) {
            console.log("Share canceled:", err);
        }
    } else {
        alert("Sharing sheet interface is blocked or unsupported in this context.");
    }
}

// 3. Android / UniversalBrowser File Download Fallback Layer
function downloadDirectly() {
    if (!activeBlob) return;
    
    const downloadLink = document.createElement("a");
    downloadLink.download = activeFilename;
    downloadLink.href = URL.createObjectURL(activeBlob);
    downloadLink.click();
    
    // Revoke object URL after structural click execution to optimize clean device browser engine runtimes
    setTimeout(() => URL.revokeObjectURL(downloadLink.href), 100);
}

// 4. Interface state destruction layer
function closePreview() {
    document.getElementById("previewOverlay").style.display = "none";
    
    // Clean down old memory objects
    if (document.getElementById("previewImage").src.startsWith("blob:")) {
        URL.revokeObjectURL(document.getElementById("previewImage").src);
    }
    activeBlob = null;
    activeFilename = "";
}
</script>

</body>
</html>
